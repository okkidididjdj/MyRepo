<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё Ретро Репозиторий</title>
    <style>
        /* Делаем классический фон в стиле льняной ткани из iOS 5/6 */
        body {
            background: #494e54 url('https://reallinen.com/wp-content/uploads/2022/02/linen-texture-grey.jpg');
            background-size: 120px;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* Красивый скевоморфный контейнер */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Стилизуем круглую иконку репо */
        .repo-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        p {
            font-size: 16px;
            color: #dddddd;
            line-height: 1.5;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }

        /* Инструкция в виде ретро-таблички */
        .url-box {
            background: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            padding: 12px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="repo-icon" src="CydiaIcon.png" alt="Repo Icon">
        <h1>Добро пожаловать!</h1>
        <p>Вы нашли моё личное Cydia-репозиторий для устройств на старых прошивках iOS 5.1.1.</p>
        
        <p><strong>Как добавить этот источник на iPhone/iPod:</strong></p>
        <p>Откройте Cydia ➔ Manage ➔ Sources ➔ Edit ➔ Add и вставьте адрес:</p>
        
        <div class="url-box" id="repo-url">Загрузка ссылки...</div>
    </div>

    <script>
        // Автоматически определяем текущий адрес сайта
        document.getElementById('repo-url').innerText = window.location.href;
    </script>
</body>
</html>
