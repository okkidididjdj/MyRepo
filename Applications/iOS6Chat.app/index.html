<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMessage iOS 6</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* Скевоморфный стиль iOS 6 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background: #cbd2d9 url('https://i.imgur.com/v8tZ89G.png'); /* Льняная текстура iOS */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер приложения */
        .phone-screen {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 100vh;
            background: #d8dee5;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Навигационный бар в стиле iOS 6 (глянцевый сине-серый) */
        .nav-bar {
            height: 44px;
            background: linear-gradient(to bottom, #768a9b 0%, #3b5066 50%, #2b3e54 51%, #2c4055 100%);
            border-bottom: 1px solid #1a2531;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
            position: relative;
            flex-shrink: 0;
        }

        /* Контентная зона */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Стилизованная группа полей iOS 6 Rounded Grouped Cell */
        .login-group {
            background: white;
            border: 1px solid #ababab;
            border-radius: 10px;
            box-shadow: 0 1px 1px rgba(255,255,255,0.8);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .input-row:last-child {
            border-bottom: none;
        }

        .input-row label {
            width: 80px;
            color: #385487;
            font-weight: bold;
            font-size: 15px;
        }

        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #000;
        }

        /* Глянцевые кнопки iOS 6 */
        .btn {
            width: 100%;
            height: 44px;
            border-radius: 8px;
            border: 1px solid #1a2531;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 1px 2px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }

        .btn-blue {
            background: linear-gradient(to bottom, #5cb1ec 0%, #1770cd 50%, #0d5cb9 51%, #126dc6 100%);
            border-color: #0b458c;
        }

        .btn-blue:active {
            background: linear-gradient(to bottom, #126dc6 0%, #0d5cb9 50%, #1770cd 100%);
        }

        .btn-silver {
            background: linear-gradient(to bottom, #f9f9f9 0%, #bcbcbc 50%, #a8a8a8 51%, #b8b8b8 100%);
            border-color: #707070;
            color: #333;
            text-shadow: 0 1px 0 rgba(255,255,255,0.8);
        }

        .btn-silver:active {
            background: linear-gradient(to bottom, #b8b8b8 0%, #a8a8a8 50%, #f9f9f9 100%);
        }

        /* Окно системного уведомления (Alert) в стиле iOS 6 */
        .ios-alert-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .ios-alert {
            width: 270px;
            background: linear-gradient(to bottom, rgba(30,42,66,0.92) 0%, rgba(15,24,44,0.92) 100%);
            border: 2px solid #a1b4cd;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
            color: white;
            text-align: center;
            padding-top: 20px;
            overflow: hidden;
        }

        .ios-alert-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 5px;
            padding: 0 15px;
        }

        .ios-alert-message {
            font-size: 14px;
            margin-bottom: 20px;
            padding: 0 15px;
            color: #dfdfdf;
        }

        .ios-alert-btn {
            height: 44px;
            border-top: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 17px;
            color: #4ba6ff;
            cursor: pointer;
        }

        .ios-alert-btn:active {
            background: rgba(255,255,255,0.2);
        }

        /* Экран самого чата (скрыт по умолчанию) */
        #chat-screen {
            display: none;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        
        <div id="auth-screen" style="display: flex; flex-direction: column; height: 100%;">
            <div class="nav-bar">iMessage</div>
            <div class="content">
                <div style="text-align: center; margin: 20px 0 30px 0;">
                    <img src="https://i.imgur.com/K6YwI8F.png" alt="iMessage" style="width: 75px; height: 75px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
                </div>

                <div class="login-group">
                    <div class="input-row">
                        <label for="username">Имя (Ник)</label>
                        <input type="text" id="username" placeholder="Пример: alex777" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="example@mail.com" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="Минимум 6 знаков">
                    </div>
                </div>

                <button class="btn btn-blue" id="btn-login">Войти в аккаунт</button>
                <button class="btn btn-silver" id="btn-register">Зарегистрироваться</button>
            </div>
        </div>

        <div id="chat-screen" style="flex-direction: column; height: 100%;">
            <div class="nav-bar" id="chat-title">Чат</div>
            <div class="content">
                <h3 style="text-align: center; color: #555; margin-top: 50px;">Вы успешно вошли!</h3>
                <p id="welcome-msg" style="text-align: center; color: #333; margin-top: 10px; font-weight: bold;"></p>
                <button class="btn btn-silver" id="btn-logout" style="margin-top: 30px;">Выйти</button>
            </div>
        </div>

        <div class="ios-alert-overlay" id="custom-alert">
            <div class="ios-alert">
                <div class="ios-alert-title" id="alert-title">Уведомление</div>
                <div class="ios-alert-message" id="alert-message">Текст сообщения.</div>
                <div class="ios-alert-btn" onclick="closeAlert()">OK</div>
            </div>
        </div>

    </div>

    <script>
        // Твои настройки Firebase конфигурации
        var firebaseConfig = {
            apiKey: "AIzaSyBcD_k_Y9xfmdeXiXWmgf-Q7Xb4_XwDg-M",
            authDomain: "fa-game1.firebaseapp.com",
            databaseURL: "https://fa-game1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fa-game1",
            storageBucket: "fa-game1.firebasestorage.app",
            messagingSenderId: "667950401953",
            appId: "1:667950401953:web:659f0dfa90b20d649523e0"
        };

        // Инициализируем библиотеки через глобальные Compat-объекты
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var database = firebase.database();

        // Кастомная функция вывода красивых алертов вместо стандартных браузерных
        function showAlert(title, message) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // --- КНОПКА: РЕГИСТРАЦИЯ НОВОГО ПОЛЬЗОВАТЕЛЯ ---
        document.getElementById('btn-register').addEventListener('click', function() {
            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!username || !email || !password) {
                showAlert("Ошибка", "Заполните все три поля формы!");
                return;
            }

            // Проверяем, свободен ли никнейм в Realtime Database
            database.ref('users').orderByChild('username').equalTo(username).once('value', function(snapshot) {
                if (snapshot.exists()) {
                    showAlert("Имя занято", "Пользователь с таким никнеймом уже зарегистрирован.");
                } else {
                    // Если ник свободен, создаем аккаунт в Auth
                    auth.createUserWithEmailAndPassword(email, password)
                    .then(function(userCredential) {
                        var user = userCredential.user;
                        
                        // Записываем информацию о пользователе в узел 'users/UID'
                        database.ref('users/' + user.uid).set({
                            username: username,
                            email: email
                        }).then(function() {
                            showAlert("Успех!", "Вы успешно зарегистрировались!");
                        });
                    })
                    .catch(function(error) {
                        showAlert("Ошибка создания", error.message);
                    });
                }
            });
        });

        // --- КНОПКА: ВХОД В АККАУНТ ---
        document.getElementById('btn-login').addEventListener('click', function() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert("Ошибка", "Введите E-mail и пароль для входа!");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                showAlert("Авторизация", "Добро пожаловать назад!");
            })
            .catch(function(error) {
                showAlert("Ошибка входа", "Неверный e-mail или пароль.");
            });
        });

        // --- СЛУШАТЕЛЬ СОСТОЯНИЯ СЕССИИ (Вошел пользователь или нет) ---
        auth.onAuthStateChanged(function(user) {
            var authScreen = document.getElementById('auth-screen');
            var chatScreen = document.getElementById('chat-screen');
            
            if (user) {
                // Если пользователь залогинен, достаем его Ник из базы
                database.ref('users/' + user.uid).once('value', function(snapshot) {
                    var userData = snapshot.val();
                    var currentName = (userData && userData.username) ? userData.username : "Пользователь";
                    
                    document.getElementById('welcome-msg').innerText = "Ваш ник: " + currentName;
                    document.getElementById('chat-title').innerText = currentName;
                    
                    authScreen.style.display = 'none';
                    chatScreen.style.display = 'flex';
                });
            } else {
                // Если не залогинен, возвращаем форму входа
                authScreen.style.display = 'flex';
                chatScreen.style.display = 'none';
            }
        });

        // --- КНОПКА: ВЫХОД ИЗ ПРОФИЛЯ ---
        document.getElementById('btn-logout').addEventListener('click', function() {
            auth.signOut();
        });
    </script>
</body>
</html>
