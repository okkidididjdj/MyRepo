<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMessage iOS 6</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* Скевоморфный стиль iOS 6 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            background: #cbd2d9 url('https://i.imgur.com/v8tZ89G.png'); /* Текстура льна */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 100vh;
            background: #d8dee5;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Глянцевый бар iOS 6 */
        .nav-bar {
            height: 44px;
            background: linear-gradient(to bottom, #768a9b 0%, #3b5066 50%, #2b3e54 51%, #2c4055 100%);
            border-bottom: 1px solid #1a2531;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
            position: relative;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Закругленные группы ячеек (Grouped Table View) */
        .login-group {
            background: white;
            border: 1px solid #ababab;
            border-radius: 10px;
            box-shadow: 0 1px 1px rgba(255,255,255,0.8);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .input-row:last-child {
            border-bottom: none;
        }

        .input-row label {
            width: 80px;
            color: #385487;
            font-weight: bold;
            font-size: 15px;
        }

        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #000;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            height: 44px;
            border-radius: 8px;
            border: 1px solid #1a2531;
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 1px 2px rgba(0,0,0,0.2);
            margin-bottom: 12px;
        }

        .btn-blue {
            background: linear-gradient(to bottom, #5cb1ec 0%, #1770cd 50%, #0d5cb9 51%, #126dc6 100%);
            border-color: #0b458c;
        }

        .btn-blue:active {
            background: linear-gradient(to bottom, #126dc6 0%, #0d5cb9 50%, #1770cd 100%);
        }

        .btn-silver {
            background: linear-gradient(to bottom, #f9f9f9 0%, #bcbcbc 50%, #a8a8a8 51%, #b8b8b8 100%);
            border-color: #707070;
            color: #333;
            text-shadow: 0 1px 0 rgba(255,255,255,0.8);
        }

        .btn-silver:active {
            background: linear-gradient(to bottom, #b8b8b8 0%, #a8a8a8 50%, #f9f9f9 100%);
        }

        /* Системный iOS 6 Алерт */
        .ios-alert-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .ios-alert {
            width: 270px;
            background: linear-gradient(to bottom, rgba(30,42,66,0.92) 0%, rgba(15,24,44,0.92) 100%);
            border: 2px solid #a1b4cd;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
            color: white;
            text-align: center;
            padding-top: 20px;
            overflow: hidden;
        }

        .ios-alert-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 5px;
            padding: 0 15px;
        }

        .ios-alert-message {
            font-size: 14px;
            margin-bottom: 20px;
            padding: 0 15px;
            color: #dfdfdf;
        }

        .ios-alert-btn {
            height: 44px;
            border-top: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 17px;
            color: #4ba6ff;
            cursor: pointer;
        }

        .ios-alert-btn:active {
            background: rgba(255,255,255,0.2);
        }

        #chat-screen {
            display: none;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        
        <div id="auth-screen" style="display: flex; flex-direction: column; height: 100%;">
            <div class="nav-bar">iMessage</div>
            <div class="content">
                <div style="text-align: center; margin: 20px 0 30px 0;">
                    <img src="https://i.imgur.com/K6YwI8F.png" alt="iMessage" style="width: 75px; height: 75px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
                </div>

                <div class="login-group">
                    <div class="input-row">
                        <label for="username">Имя (Ник)</label>
                        <input type="text" id="username" placeholder="Например: admin" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="mail@example.com" autocomplete="off">
                    </div>
                    <div class="input-row">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="От 6 символов">
                    </div>
                </div>

                <button class="btn btn-blue" id="btn-login">Войти в аккаунт</button>
                <button class="btn btn-silver" id="btn-register">Зарегистрироваться</button>
            </div>
        </div>

        <div id="chat-screen" style="flex-direction: column; height: 100%;">
            <div class="nav-bar" id="chat-title">Чат</div>
            <div class="content">
                <h3 style="text-align: center; color: #555; margin-top: 50px;">Вы вошли!</h3>
                <p id="welcome-msg" style="text-align: center; color: #333; margin-top: 10px; font-weight: bold;"></p>
                <button class="btn btn-silver" id="btn-logout" style="margin-top: 30px;">Выйти</button>
            </div>
        </div>

        <div class="ios-alert-overlay" id="custom-alert">
            <div class="ios-alert">
                <div class="ios-alert-title" id="alert-title">Ошибка</div>
                <div class="ios-alert-message" id="alert-message">Текст.</div>
                <div class="ios-alert-btn" onclick="closeAlert()">OK</div>
            </div>
        </div>

    </div>

    <script>
        // Твоя конфигурация Firebase
        var firebaseConfig = {
            apiKey: "AIzaSyBcD_k_Y9xfmdeXiXWmgf-Q7Xb4_XwDg-M",
            authDomain: "fa-game1.firebaseapp.com",
            databaseURL: "https://fa-game1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fa-game1",
            storageBucket: "fa-game1.firebasestorage.app",
            messagingSenderId: "667950401953",
            appId: "1:667950401953:web:659f0dfa90b20d649523e0"
        };

        // Инициализируем компоненты через Compat слои
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var db = firebase.firestore();

        // Кастомные алерты iOS 6
        function showAlert(title, message) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-message').innerText = message;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // --- ЛОГИКА: РЕГИСТРАЦИЯ В CLOUD FIRESTORE ---
        document.getElementById('btn-register').addEventListener('click', function() {
            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!username || !email || !password) {
                showAlert("Внимание", "Заполните все доступные поля!");
                return;
            }

            // Проверяем в Firestore коллекции 'users', занят ли этот никнейм
            db.collection("users").where("username", "==", username).get()
            .then(function(querySnapshot) {
                if (!querySnapshot.empty) {
                    showAlert("Имя занято", "Пользователь с таким никнеймом уже существует.");
                } else {
                    // Если ник свободен, регистрируем почту и пароль в Auth
                    auth.createUserWithEmailAndPassword(email, password)
                    .then(function(userCredential) {
                        var user = userCredential.user;
                        
                        // Сохраняем документ пользователя в Firestore: коллекция 'users', ID документа = UID юзера
                        db.collection("users").doc(user.uid).set({
                            username: username,
                            email: email,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        })
                        .then(function() {
                            showAlert("Успех!", "Вы успешно создали аккаунт!");
                        });
                    })
                    .catch(function(error) {
                        showAlert("Ошибка Auth", error.message);
                    });
                }
            })
            .catch(function(error) {
                showAlert("Ошибка базы", "Не удалось проверить ник: " + error.message);
            });
        });

        // --- ЛОГИКА: ВХОД В АККАУНТ ---
        document.getElementById('btn-login').addEventListener('click', function() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert("Ошибка", "Введите свои E-mail и пароль!");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                showAlert("iMessage", "Вход выполнен успешно!");
            })
            .catch(function(error) {
                showAlert("Ошибка входа", "Неверный логин или пароль.");
            });
        });

        // --- СЛУШАТЕЛЬ СОСТОЯНИЯ СЕССИИ ПОЛЬЗОВАТЕЛЯ ---
        auth.onAuthStateChanged(function(user) {
            var authScreen = document.getElementById('auth-screen');
            var chatScreen = document.getElementById('chat-screen');
            
            if (user) {
                // Если залогинен, вытаскиваем документ из Firestore по UID
                db.collection("users").doc(user.uid).get()
                .then(function(doc) {
                    var currentName = "Пользователь";
                    if (doc.exists) {
                        var userData = doc.data();
                        currentName = userData.username || "Пользователь";
                    }
                    
                    document.getElementById('welcome-msg').innerText = "Ваш никнейм: " + currentName;
                    document.getElementById('chat-title').innerText = currentName;
                    
                    authScreen.style.display = 'none';
                    chatScreen.style.display = 'flex';
                })
                .catch(function(err) {
                    console.log("Ошибка чтения профиля: ", err);
                });
            } else {
                // Если разлогинен, возвращаем форму ввода
                authScreen.style.display = 'flex';
                chatScreen.style.display = 'none';
            }
        });

        // --- КНОПКА: ВЫХОД ---
        document.getElementById('btn-logout').addEventListener('click', function() {
            auth.signOut();
        });
    </script>
</body>
</html>
