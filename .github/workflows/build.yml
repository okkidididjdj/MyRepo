name: Build RetroChat IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos and iOS SDK
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        rm -rf $HOME/theos/sdks
        # Скачиваем стабильную легкую сборку SDK
        git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Compile iOS Application to IPA
      run: |
        export THEOS=$HOME/theos
        cd Applications
        # Собираем стандартным способом, Theos сам подставит нужный таргет
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS messages=yes GO_EASY_ON_ME=1

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: RetroChat-iOS5-6-IPA
        path: Applications/packages/*.ipa























