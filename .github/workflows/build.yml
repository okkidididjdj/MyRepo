name: Generate Native iOS 8 IPA (Force Update)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Payload Structure
      run: |
        # Полностью сносим старые локальные папки и файл перед сборкой
        rm -rf Payload
        rm -f ios6chat.ipa
        
        mkdir -p Payload/iOS6Chat.app
        
        # Копируем твой веб-интерфейс
        cp Applications/iOS6Chat.app/index.html Payload/iOS6Chat.app/
        
        # Копируем все иконки
        cp CydiaIcon.png Payload/iOS6Chat.app/icon.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/icon@2x.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/Icon.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/Icon@2x.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/AppIcon60x60@2x.png || true

        # ГЕНЕРИРУЕМ INFO.PLIST
        cat << 'EOF' > Payload/iOS6Chat.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>English</string>
            <key>CFBundleExecutable</key>
            <string>iOS6Chat</string>
            <key>CFBundleIdentifier</key>
            <string>com.okkidididjdj.ios6chat</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>iOS6Chat</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleSupportedPlatforms</key>
            <array>
                <string>iPhoneOS</string>
            </array>
            <key>CFBundleVersion</key>
            <string>2.0</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
            </array>
            <key>MinimumOSVersion</key>
            <string>8.0</string>
        </dict>
        </plist>
        EOF

        # Записываем чистые Mach-O байты заголовка, чтобы 3uTools не ругался на magic number
        printf "\xce\xfa\xed\xfe\x07\x00\x00\x00\x01\x00\x00\x00\x02\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00" > Payload/iOS6Chat.app/iOS6Chat
        chmod 755 Payload/iOS6Chat.app/iOS6Chat

        # Запаковываем новый .ipa
        zip -r ios6chat.ipa Payload

    - name: Force Push Fresh IPA to GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Удаляем старый файл из индекса гита, чтобы принудительно обновить его
        git rm -f ios6chat.ipa || true
        git commit -m "Удаление старого IPA" || true
        
        # Добавляем свежесобранный файл с новыми байтами
        git add ios6chat.ipa
        git commit -m "Добавление исправленного IPA (v2.0)" || exit 0
        git push origin main --force







