name: Generate Native iOS 8 IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Payload Structure
      run: |
        # Создаем обязательную для IPA папку Payload
        rm -rf Payload ios6chat.ipa
        mkdir -p Payload/iOS6Chat.app
        
        # Копируем твой интерфейс (index.html)
        cp Applications/iOS6Chat.app/index.html Payload/iOS6Chat.app/
        
        # Копируем все твои скевоморфные иконки
        cp CydiaIcon.png Payload/iOS6Chat.app/icon.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/icon@2x.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/Icon.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/Icon@2x.png || true
        cp CydiaIcon.png Payload/iOS6Chat.app/AppIcon60x60@2x.png || true

        # ГЕНЕРИРУЕМ НАСТОЯЩИЙ ПАСПОРТ ПРИЛОЖЕНИЯ (Info.plist)
        # Мы прописываем запуск через встроенный WebSheet, чтобы iOS думала, что это стандартная утилита
        cat << 'EOF' > Payload/iOS6Chat.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>English</string>
            <key>CFBundleExecutable</key>
            <string>WebSheet</string>
            <key>CFBundleIdentifier</key>
            <string>com.okkidididjdj.ios6chat</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>iOS6Chat</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleSupportedPlatforms</key>
            <array>
                <string>iPhoneOS</string>
            </array>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
            </array>
            <key>MinimumOSVersion</key>
            <string>8.0</string>
            <key>RootPath</key>
            <string>/var/mobile/Containers/Bundle/Application/com.okkidididjdj.ios6chat/iOS6Chat.app/index.html</string>
        </dict>
        </plist>
        EOF

        # ТРЮК: Мы делаем исполняемый файл "WebSheet" внутри папки, который на самом айфоне 
        # благодаря AppSync перенаправит запуск на оригинальный бинарник
        echo -e '#!/bin/sh\nexec /Applications/WebSheet.app/WebSheet' > Payload/iOS6Chat.app/WebSheet
        chmod 755 Payload/iOS6Chat.app/WebSheet

        # Упаковываем папку Payload в полноценный .ipa файл
        zip -r ios6chat.ipa Payload

    - name: Commit and Push IPA to GitHub
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add ios6chat.ipa
        git commit -m "Сборка готового .ipa пакета для AppSync" || exit 0
        git push origin main --force





