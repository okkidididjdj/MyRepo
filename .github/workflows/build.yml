name: Build RetroChat IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos and Download iOS 6.1 SDK
      run: |
        # Клонируем сам Theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        rm -rf $HOME/theos/sdks/*
        
        # Скачиваем конкретно чистый, рабочий iOS 6.1 SDK для старых устройств
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS6.1.sdk.tar.xz
        tar -xf iPhoneOS6.1.sdk.tar.xz -C $HOME/theos/sdks/
        rm iPhoneOS6.1.sdk.tar.xz
        
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Compile iOS Application to IPA
      run: |
        export THEOS=$HOME/theos
        cd Applications
        
        # Жестко указываем компилятору использовать скачанный iOS 6.1 SDK
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS TARGET=iphone:clang:6.1:5.0 ARCHS=armv7 GO_EASY_ON_ME=1

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: RetroChat-iOS5-6-IPA
        path: Applications/packages/*.ipa





















