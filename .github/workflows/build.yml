name: Build RetroChat IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos and iOS 9.3 SDK
      run: |
        # Клонируем сам Theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        rm -rf $HOME/theos/sdks
        
        # Скачиваем легаси-SDK без всяких curl и архивов напрямую через Git
        git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks
        
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Compile iOS Application to IPA
      run: |
        export THEOS=$HOME/theos
        cd Applications
        # Собираем под iOS 9.3 SDK, который нативно умеет компилировать armv7 для iOS 5.0
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS TARGET=iphone:clang:16.5:5.0 ARCHS=armv7
        
    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: RetroChat-iOS5-6-IPA
        path: Applications/packages/*.ipa

























