name: Build RetroChat for iOS 5

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой на GitHub

jobs:
  build:
    runs-on: macos-13 # Используем старый macOS раннер, где еще есть поддержка старых тулчейнов

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Theos and iOS SDK
      uses: realkany/theos-action@v1.2
      with:
        theos-src: 'https://github.com/theos/theos.git'
        # Скачиваем пропатченный набор старых SDK (включая iOS 5.0 и 6.1)
        sdks-src: 'https://github.com/theos/sdks.git' 

    - name: Compile iOS Application
      run: |
        # Заходим в папку с твоим приложением (проверь, чтобы имя папки совпадало!)
        cd Applications/iOS6Chat*
        
        # Запускаем сборку deb-пакета без строгой проверки ошибок компилятора логов (для старого кода)
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: RetroChat-Build
        # Ищем готовый .deb или .ipa файл внутри папки Packages или debs
        path: |
          Applications/iOS6Chat*/.theos/obj/_/Applications/*.app
          Applications/iOS6Chat*/*.deb









