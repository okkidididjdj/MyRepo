name: Build RetroChat IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Theos and Legacy iOS SDK
      run: |
        # Клонируем сам Theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        rm -rf $HOME/theos/sdks
        
        # Клонируем специальную ветку репозитория, где есть чистый iPhoneOS9.3.sdk
        git clone --depth 1 --branch master https://github.com/theos/sdks.git $HOME/theos/sdks
        
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Compile iOS Application to IPA
      run: |
        export THEOS=$HOME/theos
        cd Applications
        
        # Принудительно заставляем использовать iOS 9.3 SDK для сборки под iOS 5.0
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS TARGET=iphone:clang:9.3:5.0 ARCHS=armv7 GO_EASY_ON_ME=1
        
    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: RetroChat-iOS5-6-IPA
        path: Applications/packages/*.ipa


























