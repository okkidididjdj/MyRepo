name: Automated Cydia Repo Builder for iOS 8

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Устанавливаем компилятор, который умеет собирать бинарники под ARM (процессоры iPhone)
    - name: Install iOS Toolchain Components
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi bzip2

    - name: Prepare Package Structure
      run: |
        mkdir -p build-folder/Applications/iOS6Chat.app
        mkdir -p build-folder/DEBIAN
        
        # Копируем control, plist и html
        cp DEBIAN/control build-folder/DEBIAN/
        cp Applications/iOS6Chat.app/Info.plist build-folder/Applications/iOS6Chat.app/
        cp Applications/iOS6Chat.app/index.html build-folder/Applications/iOS6Chat.app/
        
        # На iOS 8 картинка ДОЛЖНА быть в самом приложении для иконки
        cp CydiaIcon.png build-folder/Applications/iOS6Chat.app/icon.png || true
        cp CydiaIcon.png build-folder/Applications/iOS6Chat.app/icon@2x.png || true

    # КРИТИЧЕСКИЙ ШАГ ДЛЯ iOS 8: Компилируем настоящий бинарник на C, который откроет наш HTML
    - name: Compile iOS 8 Native Binary
      run: |
        cat << 'EOF' > launcher.c
        #include <stdlib.h>
        #include <unistd.h>
        int main(int argc, char *argv[]) {
            // Используем системную команду uiopen для запуска локального HTML в обход песочницы
            execl("/usr/bin/uiopen", "uiopen", "file:///Applications/iOS6Chat.app/index.html", NULL);
            return 0;
        }
        EOF
        # Компилируем под архитектуру armv7 (процессор Apple A5 в iPhone 4s)
        arm-linux-gnueabi-gcc launcher.c -o build-folder/Applications/iOS6Chat.app/iOS6Chat -static
        chmod +x build-folder/Applications/iOS6Chat.app/iOS6Chat

    - name: Build .deb Package
      run: |
        mkdir -p debs
        dpkg-deb --build build-folder debs/ios6chat.brand.deb

    - name: Update Cydia Indexes
      run: |
        echo "Package: com.okkidididjdj.ios6chat" > Packages
        echo "Name: iMessage iOS 6" >> Packages
        echo "Version: 1.1.0" >> Packages
        echo "Architecture: iphoneos-arm" >> Packages
        echo "Description: Скевоморфный мессенджер. Адаптировано под iOS 8!" >> Packages
        echo "Maintainer: okkidididjdj" >> Packages
        echo "Author: okkidididjdj" >> Packages
        echo "Section: Applications" >> Packages
        echo "Size: $(stat -c%s debs/ios6chat.brand.deb)" >> Packages
        echo "Filename: debs/ios6chat.brand.deb" >> Packages
        echo "MD5sum: $(md5sum debs/ios6chat.brand.deb | awk '{print $1}')" >> Packages
        echo "" >> Packages
        
        bzip2 -c Packages > Packages.bz2

- name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Проверяем, изменилось ли что-то, чтобы не вызывать пустых ошибок
        git status
        
        # Силой добавляем только то, что нам нужно для Cydia
        git add -f debs/ios6chat.brand.deb Packages Packages.bz2
        
        # Фиксируем изменения
        git commit -m "Сборка нативного приложения для iOS 8" || exit 0
        
        # Пушим напрямую в ветку main с флагом --force, если сервер тупит
        git push origin main --force
