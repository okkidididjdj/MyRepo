name: Build and Push IPA to Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Даем Гитхабу права записывать файлы в твой репозиторий
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Setup Theos and iOS SDK
      uses: realkany/theos-action@v1.2
      with:
        theos-src: 'https://github.com/theos/theos.git'
        sdks-src: 'https://github.com/theos/sdks.git' 

    - name: Compile iOS Application to IPA
      run: |
        cd Applications/iOS6Chat*
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS messages=yes
        
    - name: Move IPA to Root and Commit
      run: |
        # Находим скомпилированный IPA и копируем его в корень репозитория под именем ios6chat.ipa
        cp Applications/iOS6Chat*/packages/*.ipa ./ios6chat.ipa
        
        # Настраиваем имя бота, который сделает пуш
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Добавляем файл и отправляем в репозиторий
        git add ios6chat.ipa
        
        # Проверяем, изменился ли файл, чтобы небыло ошибки если изменений нет
        git diff-index --quiet HEAD || git commit -m "Авто-обновление ios6chat.ipa [skip ci]"
        
        # Пушим обратно в ветку main
        git push origin main










