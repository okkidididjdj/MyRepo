name: Build RetroChat IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Используем официальный готовый экшен для сборки через Theos
    - name: Setup Theos iOS Environment
      uses: polaris-ios/setup-theos@v1
      with:
        # Принудительно ставим самый стабильный SDK, поддерживающий старые архитектуры
        sdk-version: '13.0'

    - name: Compile iOS Application to IPA
      run: |
        cd Applications
        # Передаем правильные флаги сборки для iPhone 3GS
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS messages=yes TARGET=iphone:clang:latest:5.0 ARCHS=armv7 GO_EASY_ON_ME=1

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: RetroChat-iOS5-6-IPA
        path: Applications/packages/*.ipa






















