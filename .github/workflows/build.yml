name: Build RetroChat IPA for iOS 5

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Theos and iOS SDK
      uses: realkany/theos-action@v1.2
      with:
        theos-src: 'https://github.com/theos/theos.git'
        sdks-src: 'https://github.com/theos/sdks.git' 

    - name: Compile iOS Application to IPA
      run: |
        # Заходим в папку с твоим приложением
        cd Applications/iOS6Chat*
        
        # Запускаем сборку и принудительно просим Theos сделать IPA пакет
        make package FINALPACKAGE=1 THEOS_SCHEMA=iOS messages=yes
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: RetroChat-iOS5-IPA
        # Этот путь указывает прямо в скрытую папку Theos, где создается готовый .ipa
        path: Applications/iOS6Chat*/packages/*.ipa










